<script>
    (function() {
      var currentPath = window.location.pathname || "";
      currentPath = currentPath.replace(/\/+$/, "");
      if (!currentPath) return;
    
      function normalizePath(url) {
        if (!url) return "";
        var a = document.createElement("a");
        a.href = url;
        var path = a.pathname || "";
        if (path.length > 1) {
          path = path.replace(/\/+$/, "");
        }
        return path;
      }
    
      function findMatchingEntry(node, targetPath) {
        var i, result, graph, item, nestedGraph;
    
        if (!node) return null;
    
        if (Object.prototype.toString.call(node) === "[object Array]") {
          for (i = 0; i < node.length; i++) {
            result = findMatchingEntry(node[i], targetPath);
            if (result) return result;
          }
          return null;
        }
    
        if (typeof node === "object") {
          if (node["@graph"] && Object.prototype.toString.call(node["@graph"]) === "[object Array]") {
            graph = node["@graph"];
    
            for (i = 0; i < graph.length; i++) {
              item = graph[i];
    
              if (item && item["@type"] === "WebPage" && item.url) {
                if (normalizePath(item.url) === targetPath) {
                  return node;
                }
              }
    
              if (item && item["@graph"]) {
                nestedGraph = findMatchingEntry(item, targetPath);
                if (nestedGraph) {
                  return node;
                }
              }
            }
          }
        }
    
        return null;
      }
    
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "https://stereojones.github.io/askamelia-structured-data/medspa_local_schema.json", true);
    
      xhr.onload = function() {
        if (xhr.status < 200 || xhr.status >= 300) {
          if (window.console && console.error) {
            console.error("JSON-LD: failed to load file", xhr.status, xhr.statusText);
          }
          return;
        }
    
        try {
          var data = JSON.parse(xhr.responseText);
          var matchedEntry = findMatchingEntry(data, currentPath);
    
          if (matchedEntry) {
            var script = document.createElement("script");
            script.type = "application/ld+json";
            script.text = JSON.stringify(matchedEntry);
            document.head.appendChild(script);
    
            if (window.console && console.log) {
              console.log("JSON-LD: matched and injected for path:", currentPath);
            }
          } else if (window.console && console.warn) {
            console.warn("JSON-LD: no matching entry for path:", currentPath);
          }

      };
    
      xhr.send();
